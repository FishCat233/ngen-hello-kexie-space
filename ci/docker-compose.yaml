version: '3.8'

services:
  ngen-hello-kexie-space:
    image: ngen-hello-kexie-space:latest
    container_name: ngen-hello-kexie-space
    ports:
      - "8080:80"
    restart: unless-stopped
    # 可选：健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
